<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="課程追蹤">
<meta name="theme-color" content="#f5f4ed">
<!-- PWA Manifest（正式外部檔案，iOS Safari 才能識別並安裝） -->
<link rel="manifest" href="./manifest.json">
<title>課程進度追蹤</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   Apple-grade UI — 課程進度追蹤
   字型：Inter (Google Fonts) → SF Pro fallback → system
   色調：Apple Light（#f5f5f7 bg, white cards, blue accent）
   ═══════════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root{
  /* ── Core palette ── */
  --bg:         #f5f5f7;
  --surface:    #ffffff;
  --card:       #ffffff;
  --card-2:     #f5f5f7;
  --border:     rgba(0,0,0,0.1);
  --border-lt:  rgba(0,0,0,0.06);

  /* ── Text ── */
  --text:       #1d1d1f;
  --text-2:     rgba(0,0,0,0.56);
  --text-3:     rgba(0,0,0,0.36);

  /* ── Brand / Accent ── */
  --accent:     #c96442;          /* warm terracotta — keep brand */
  --accent-2:   #0071e3;          /* Apple blue — secondary action */
  --accent-h:   #b55538;

  /* ── Semantic ── */
  --sand:       #ededf0;
  --done-bg:    #edf4ed;
  --done-c:     #3a7d44;
  --warn-bg:    #fff6e0;
  --warn-c:     #a16b00;
  --danger-bg:  #fff0f0;
  --danger-c:   #d93025;

  /* ── Radius scale ── */
  --r-xs:  6px;
  --r-sm: 12px;
  --r:    18px;
  --r-lg: 22px;
  --r-xl: 28px;

  /* ── Shadows ── */
  --shadow-sm:  0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow:     0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
  --shadow-md:  0 8px 32px rgba(0,0,0,.10), 0 2px 8px rgba(0,0,0,.06);
  --shadow-lg:  0 20px 60px rgba(0,0,0,.14), 0 4px 16px rgba(0,0,0,.08);
  --shadow-card:rgba(0,0,0,.22) 3px 5px 30px 0px;

  /* ── Glass ── */
  --glass-bg:   rgba(255,255,255,0.72);
  --glass-border: rgba(255,255,255,0.5);
  --blur:       saturate(180%) blur(20px);

  /* ── Typography ── */
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
  --serif: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;

  /* ── Layout ── */
  --nav-h: 52px;
  --bot-h: 64px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ── Reset ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  letter-spacing:-0.2px;
}

/* ── PWA Install Banner ── */
#install-banner{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:rgba(29,29,31,0.92);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  color:#fff;padding:14px 20px;
  padding-bottom:calc(14px + env(safe-area-inset-bottom));
  font-family:var(--sans);font-size:13px;
  flex-direction:column;gap:10px;
  border-top:1px solid rgba(255,255,255,0.12);
}
#install-banner.show{display:flex;}
.install-banner-row{display:flex;align-items:center;gap:12px;}
.install-banner-icon{font-size:28px;flex-shrink:0;}
.install-banner-text{flex:1;line-height:1.4;}
.install-banner-text b{display:block;font-size:14px;font-weight:600;margin-bottom:2px;}
.install-banner-text span{font-size:12px;opacity:.65;}
.install-banner-btns{display:flex;gap:8px;justify-content:flex-end;}
.install-banner-btns button{
  font-family:var(--sans);font-size:13px;font-weight:500;
  padding:7px 16px;border:none;border-radius:980px;cursor:pointer;transition:opacity .15s;
}
.ib-yes{background:var(--accent);color:#fff;}
.ib-yes:hover{opacity:.88;}
.ib-no{background:rgba(255,255,255,0.15);color:#fff;}
.ib-no:hover{background:rgba(255,255,255,0.22);}
#ios-install-tip{
  display:none;font-size:11px;color:rgba(255,255,255,.65);
  text-align:center;padding-top:6px;border-top:1px solid rgba(255,255,255,.12);
}
#ios-install-tip.show{display:block;}

/* ── App Header ── */
.app-header{
  height:var(--nav-h);
  background:var(--glass-bg);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid var(--border-lt);
  position:relative;z-index:20;
  display:flex;flex-direction:column;flex-shrink:0;
}
.header-row{
  flex:1;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
}
.app-header h1{
  font-family:var(--serif);font-size:17px;font-weight:600;
  letter-spacing:-0.4px;color:var(--text);
}
.header-actions{display:flex;gap:6px;align-items:center;}
.global-pct{font-size:11px;color:var(--text-3);letter-spacing:-.1px;}
.global-pct b{color:var(--accent);font-weight:600;}

/* Progress bar */
.progress-track{height:2px;background:rgba(0,0,0,.06);}
.progress-track-fill{height:100%;background:var(--accent);transition:width .6s var(--ease);}

/* ── Sync status ── */
.sync-bar{display:flex;align-items:center;gap:8px;}
.sync-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
  background:var(--border);transition:background .3s;
}
.sync-dot.synced{background:#34c759;}
.sync-dot.syncing{background:#ff9f0a;animation:pulse .9s infinite;}
.sync-dot.error{background:var(--danger-c);}
.sync-dot.offline{background:rgba(0,0,0,.2);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.sync-label{font-size:11px;color:var(--text-3);}
#sync-popover{
  display:none;position:fixed;z-index:200;
  background:var(--glass-bg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--glass-border);border-radius:var(--r);
  padding:20px;box-shadow:var(--shadow-lg);width:280px;
}
#sync-popover h3{font-size:15px;font-weight:600;margin-bottom:8px;letter-spacing:-.3px;}
#sync-popover p{font-size:12px;color:var(--text-2);margin-bottom:12px;line-height:1.6;}
.sync-pop-note{font-size:11px;color:var(--text-3);margin-top:8px;line-height:1.5;}
.sync-pop-note a{color:var(--accent);text-decoration:none;}
.sync-connected-info{font-size:12px;color:var(--done-c);margin-bottom:10px;padding:8px 12px;background:var(--done-bg);border-radius:var(--r-sm);}

/* ── App shell ── */
.app-shell{
  display:flex;flex-direction:column;
  height:calc(100vh - var(--nav-h));
  height:calc(100dvh - var(--nav-h));
}
.layout{
  display:grid;
  grid-template-columns:272px 1fr 272px;
  flex:1;
  overflow:hidden;
  height:100%;
}

/* ── Side Panels ── */
.panel{
  overflow-y:auto;padding:16px 14px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
  background:var(--bg);
}
.panel::-webkit-scrollbar{width:4px;}
.panel::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:2px;}
.panel-l{border-right:1px solid var(--border-lt);}
.panel-r{border-left:1px solid var(--border-lt);}
.section{margin-bottom:20px;}
.section-label{
  font-size:10px;font-weight:600;letter-spacing:.8px;
  text-transform:uppercase;color:var(--text-3);margin-bottom:10px;
}

/* ── Bottom nav (mobile only) ── */
.bottom-nav{display:none;}

/* ── Form inputs ── */
.form-group{margin-bottom:7px;}
.form-label{font-size:11px;font-weight:500;color:var(--text-2);margin-bottom:3px;letter-spacing:-.1px;}
input[type=text],input[type=number],input[type=date],select:not(.time-sel){
  font-family:var(--sans);font-size:13px;width:100%;
  padding:8px 12px;
  border:1px solid rgba(0,0,0,.14);border-radius:var(--r-sm);
  background:var(--card);color:var(--text);
  outline:none;
  transition:border-color .15s var(--ease), box-shadow .15s var(--ease);
  -webkit-appearance:none;appearance:none;
  letter-spacing:-.1px;
}
input::placeholder{color:var(--text-3);}
input:focus,select:focus{
  border-color:var(--accent-2);
  box-shadow:0 0 0 3px rgba(0,113,227,.18);
}

/* ── Buttons ── */
.form-row{display:flex;gap:6px;}
.btn{
  font-family:var(--sans);font-size:13px;font-weight:500;
  padding:8px 16px;border:none;border-radius:980px;
  cursor:pointer;
  transition:opacity .15s var(--ease), transform .1s var(--ease), background .15s;
  white-space:nowrap;letter-spacing:-.1px;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(201,100,66,.35);}
.btn-primary:hover{opacity:.9;}
.btn-sand{background:var(--sand);color:var(--text-2);}
.btn-sand:hover{background:rgba(0,0,0,.1);}
.btn-xs{font-size:11px;padding:5px 12px;}

/* ── Weekday checkboxes ── */
.wday-wrap{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;}
.wday-cb{display:none;}
.wday-label{
  width:30px;height:30px;border-radius:50%;
  background:var(--sand);color:var(--text-2);
  font-size:12px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;
  transition:all .2s var(--ease-spring);
}
.wday-cb:checked+.wday-label{
  background:var(--accent);color:#fff;
  box-shadow:0 2px 8px rgba(201,100,66,.4);
  transform:scale(1.08);
}

/* ── Course card ── */
.course-card{
  background:var(--card);
  border:1px solid var(--border-lt);
  border-radius:var(--r);
  padding:12px 14px;margin-bottom:8px;
  box-shadow:var(--shadow-sm);
  transition:box-shadow .2s var(--ease), transform .2s var(--ease);
}
.course-card:hover{
  box-shadow:var(--shadow);
  transform:translateY(-1px);
}
.course-head{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.course-name{font-size:13px;font-weight:600;flex:1;letter-spacing:-.1px;}
.del-btn{
  background:none;border:none;cursor:pointer;
  color:var(--text-3);font-size:16px;line-height:1;padding:2px 4px;
  border-radius:6px;transition:all .15s;
}
.del-btn:hover{color:var(--danger-c);background:var(--danger-bg);}
.exam-edit-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;}
.exam-edit-lbl{font-size:11px;color:var(--text-3);flex-shrink:0;}
.exam-edit-row input[type=date]{font-size:11px;padding:3px 8px;border-radius:8px;flex:1;}
.exam-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:600;
  padding:2px 10px;border-radius:980px;margin-bottom:5px;letter-spacing:.1px;
}
.exam-badge.ok{background:#d4edda;color:#1a6b32;}
.exam-badge.warn{background:var(--warn-bg);color:var(--warn-c);}
.exam-badge.danger{background:var(--danger-bg);color:var(--danger-c);}
.course-meta{font-size:11px;color:var(--text-3);margin-bottom:6px;letter-spacing:-.05px;}
.progress-wrap{height:4px;background:rgba(0,0,0,.08);border-radius:980px;overflow:hidden;}
.progress-fill{height:100%;border-radius:980px;transition:width .6s var(--ease);}

/* ── Todo cards ── */
.todo-card{
  display:flex;align-items:center;gap:10px;
  background:var(--card);
  border:1px solid var(--border-lt);
  border-radius:var(--r);
  padding:10px 12px;margin-bottom:7px;
  cursor:grab;user-select:none;
  box-shadow:var(--shadow-sm);
  transition:box-shadow .2s var(--ease), transform .2s var(--ease), border-color .15s;
}
.todo-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);border-color:rgba(0,0,0,.15);}
.todo-card.dragging{opacity:.2;cursor:grabbing;transform:scale(.98);}
.todo-card.tap-selected{
  border-color:var(--accent);background:#fff9f7;
  box-shadow:0 0 0 3px rgba(201,100,66,.18);
}
.todo-info{flex:1;}
.todo-name{font-size:13px;font-weight:600;letter-spacing:-.1px;}
.todo-rem{font-size:11px;color:var(--text-3);}
.drag-icon{font-size:15px;color:var(--text-3);letter-spacing:-1px;}
.muted{font-size:12px;color:var(--text-3);text-align:center;padding:14px 0;}
.tap-hint{
  font-size:11px;color:var(--accent);text-align:center;
  padding:5px 10px;margin-bottom:8px;
  background:rgba(201,100,66,.07);border-radius:980px;display:none;
}

/* ── Drag ghost ── */
#drag-ghost{
  position:fixed;pointer-events:none;z-index:9999;
  background:var(--glass-bg);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1.5px solid var(--accent);
  border-radius:var(--r);padding:7px 14px 7px 11px;
  box-shadow:var(--shadow-lg);
  font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:8px;
  transform:translate(-10px,-50%);opacity:0;transition:opacity .12s;top:-999px;left:-999px;
}
#drag-ghost.active{opacity:.95;}

/* ═══════════════════════════════════════════════════════════════
   CALENDAR PANEL — Grid layout prevents memo compression
   Row 0: cal-head (sticky, auto)
   Row 1: cal-body (flex: takes all free space, scrolls internally)
   Row 2: memo-area (auto, never crushes calendar)
   ═══════════════════════════════════════════════════════════════ */
.cal-panel{
  display:grid;
  grid-template-rows:auto 1fr auto;
  overflow:hidden;
  min-height:0;
  background:var(--bg);
}

/* Calendar header — sticky glass */
.cal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 10px;
  flex-shrink:0;gap:6px;
  background:var(--glass-bg);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid var(--border-lt);
  z-index:10;
}
.cal-title{
  font-family:var(--serif);font-size:18px;font-weight:600;
  letter-spacing:-.4px;flex:1;color:var(--text);
}
.view-toggle{
  display:flex;background:var(--sand);border-radius:980px;
  padding:3px;gap:2px;
}
.vt-btn{
  font-family:var(--sans);font-size:12px;font-weight:500;
  padding:4px 12px;border:none;border-radius:980px;
  cursor:pointer;background:transparent;color:var(--text-2);
  transition:all .2s var(--ease);
}
.vt-btn.active{
  background:var(--card);color:var(--text);
  box-shadow:0 1px 4px rgba(0,0,0,.12);
}
.cal-nav{display:flex;gap:4px;}
.cal-nav button{
  background:var(--sand);border:none;border-radius:50%;
  width:30px;height:30px;cursor:pointer;font-size:16px;
  color:var(--text-2);transition:all .2s var(--ease);
  display:flex;align-items:center;justify-content:center;
}
.cal-nav button:hover{background:rgba(0,0,0,.1);transform:scale(1.08);}

/* Calendar body — scrollable, takes all available height */
.cal-body{
  overflow-y:auto;
  min-height:0;
  scrollbar-width:thin;
  scrollbar-color:rgba(0,0,0,.1) transparent;
}
.cal-body::-webkit-scrollbar{width:4px;}
.cal-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:2px;}

/* Month grid */
.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:3px;padding:10px 10px 10px;
}
.cal-lbl{
  text-align:center;font-size:10px;font-weight:600;
  letter-spacing:.5px;color:var(--text-3);padding:4px 0 8px;
}
.cal-cell{
  min-height:72px;
  background:var(--card);
  border:1px solid var(--border-lt);
  border-radius:var(--r-sm);
  padding:5px 4px 4px;cursor:pointer;
  box-shadow:var(--shadow-sm);
  transition:border-color .15s var(--ease), background .15s, box-shadow .2s var(--ease), transform .15s var(--ease));
}
.cal-cell:hover:not(.empty){
  border-color:rgba(201,100,66,.5);
  box-shadow:var(--shadow);
  transform:translateY(-1px) scale(1.01);
  z-index:1;position:relative;
}
.cal-cell.empty{background:transparent;border-color:transparent;box-shadow:none;cursor:default;}
.cal-cell.selected{
  border-color:var(--accent);background:#fff9f7;
  box-shadow:0 0 0 2px rgba(201,100,66,.2), var(--shadow);
}
.cal-cell.drag-over{border-color:var(--accent);background:rgba(201,100,66,.07);transform:scale(1.02);}
.cal-cell.tap-target-ready{border-color:var(--accent);background:rgba(201,100,66,.05);}
.cal-cell.today .date-num{
  background:var(--accent);color:#fff;border-radius:50%;
  width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(201,100,66,.4);
}
.date-num{font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:2px;width:22px;}
.cal-tags{display:flex;flex-direction:column;gap:2px;}
.cal-tag{
  display:flex;align-items:center;gap:3px;
  padding:1px 5px 1px 4px;border-radius:6px;
  font-size:10px;font-weight:600;line-height:1.6;overflow:hidden;
}
.cal-tag-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.cal-tag-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cal-overflow{font-size:10px;color:var(--text-3);padding-left:4px;line-height:1.6;}

/* ── Week view ── */
.week-wrap{display:flex;flex-direction:column;min-height:0;height:100%;}
.week-col-head{
  display:grid;flex-shrink:0;
  border-bottom:1px solid var(--border-lt);
  background:var(--glass-bg);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  position:sticky;top:0;z-index:9;
}
.wch-spacer{border-right:1px solid var(--border-lt);}
.wch-day{
  text-align:center;padding:6px 2px;
  font-size:10px;font-weight:600;letter-spacing:.3px;color:var(--text-3);
  border-right:1px solid var(--border-lt);
}
.wch-date{
  font-size:18px;font-weight:600;color:var(--text-2);
  font-family:var(--serif);line-height:1.2;display:block;
}
.wch-day.today-col .wch-date{color:var(--accent);}
.week-scroll{flex:1;min-height:400px;overflow:visible;}
.week-unsched-row{display:grid;border-bottom:2px solid var(--border);}
.unsched-lbl{
  font-size:9px;color:var(--text-3);padding:4px 5px 0 0;
  text-align:right;border-right:1px solid var(--border-lt);
  border-bottom:1px solid var(--border-lt);line-height:1.2;
}
.week-slot-unsched{
  min-height:28px;padding:3px;
  display:flex;flex-direction:column;gap:2px;
  border-right:1px solid var(--border-lt);border-bottom:1px solid var(--border-lt);
  background:rgba(250,250,252,.5);transition:background .12s;cursor:pointer;
}
.week-slot-unsched:hover,.week-slot-unsched.drag-over{background:rgba(201,100,66,.06);}
.week-slot-unsched.selected-slot{background:#fff9f7;}
.week-slot-unsched.tap-target-ready{background:rgba(201,100,66,.05);}
.week-hour-grid{display:grid;}
.wt-label{
  font-size:9px;color:var(--text-3);padding:0 5px 0 0;
  text-align:right;border-right:1px solid var(--border-lt);
  border-bottom:1px solid var(--border-lt);position:relative;top:-8px;
}
.week-slot{
  min-height:46px;padding:3px;
  display:flex;flex-direction:column;gap:2px;
  border-right:1px solid var(--border-lt);border-bottom:1px solid var(--border-lt);
  transition:background .12s;cursor:pointer;
}
.week-slot:hover{background:rgba(201,100,66,.04);}
.week-slot.drag-over{background:rgba(201,100,66,.09);}
.week-slot.today-slot{background:rgba(201,100,66,.025);}
.week-slot.selected-slot{background:#fff9f7;}
.week-slot.tap-target-ready{background:rgba(201,100,66,.05);}
.week-ev{

<!-- Firebase SDK -->
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import{
  getAuth,GoogleAuthProvider,
  signInWithPopup,signInWithRedirect,getRedirectResult,
  signOut,onAuthStateChanged
}from'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import{getFirestore,doc,setDoc,onSnapshot,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig={
  apiKey:"AIzaSyASGEfoKCQuxhACu_9CEQICKEHSKe2N3MA",
  authDomain:"coursesplan-211e8.firebaseapp.com",
  projectId:"coursesplan-211e8",
  storageBucket:"coursesplan-211e8.firebasestorage.app",
  messagingSenderId:"109854996123",
  appId:"1:109854996123:web:f6937171fb3109d8e6383e"
};

let app,auth,db,provider;
try{
  app=initializeApp(firebaseConfig);
  auth=getAuth(app);
  db=getFirestore(app);
  provider=new GoogleAuthProvider();
  provider.setCustomParameters({prompt:'select_account'});
  console.log('[Firebase] initialized');
}catch(e){
  console.error('[Firebase] init failed',e);
  window._fbInitError=e.message;
}

let _unsubscribe=null;

// 智能登入：先嘗試 popup，若失敗（popup blocked / mobile）改用 redirect
async function smartSignIn(){
  try{
    await signInWithPopup(auth,provider);
  }catch(e){
    if(e.code==='auth/popup-blocked'||e.code==='auth/popup-closed-by-user'||e.code==='auth/cancelled-popup-request'){
      console.log('[Firebase] popup blocked, trying redirect...');
      await signInWithRedirect(auth,provider);
    }else{
      const msg={
        'auth/unauthorized-domain':'登入失敗：此網域未授權。\n請至 Firebase Console → Authentication → Settings → Authorized domains，加入：\nabin4ni.github.io',
        'auth/network-request-failed':'登入失敗：網路錯誤，請檢查連線。',
      }[e.code]||`登入失敗：${e.message}`;
      alert(msg);
      console.error('[Firebase] signIn error',e.code,e.message);
    }
  }
}

window._fb={
  signIn:smartSignIn,
  signOut:()=>signOut(auth),
  saveToCloud:(uid,data)=>setDoc(
    doc(db,'users',uid,'data','state'),
    {...data,updatedAt:serverTimestamp()}
  ).catch(e=>console.error('[Firebase] saveToCloud error',e)),
  listenCloud:(uid,cb)=>{
    if(_unsubscribe)_unsubscribe();
    _unsubscribe=onSnapshot(
      doc(db,'users',uid,'data','state'),
      snap=>{if(snap.exists())cb(snap.data());},
      e=>console.error('[Firebase] snapshot error',e)
    );
  },
  stopListen:()=>{if(_unsubscribe){_unsubscribe();_unsubscribe=null;}},
};
window._fbReady=true;
console.log('[Firebase] _fb exposed to window');

// 處理 redirect 登入回傳
getRedirectResult(auth).then(result=>{
  if(result?.user)console.log('[Firebase] redirect result user:',result.user.email);
}).catch(e=>{
  if(e.code!=='auth/no-auth-event')console.error('[Firebase] redirect result error',e);
});

onAuthStateChanged(auth,user=>{
  console.log('[Firebase] auth state:',user?user.email:'null');
  if(user){
    window._fbUser=user;
    window.onFirebaseLogin&&window.onFirebaseLogin(user);
  }else{
    window._fbUser=null;
    window._fb.stopListen();
    window.onFirebaseLogout&&window.onFirebaseLogout();
  }
});
</script>

<script>
// ── PWA：Service Worker 註冊 + 安裝橫幅 + 離線偵測 ──────────────

// 1. 註冊 Service Worker
let _swReg = null;
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      _swReg = await navigator.serviceWorker.register('./sw.js');
      console.log('[PWA] SW registered', _swReg.scope);
      // 監聽 SW 發出的 FLUSH_SYNC 訊息（Background Sync 觸發）
      navigator.serviceWorker.addEventListener('message', e => {
        if (e.data?.type === 'FLUSH_SYNC') {
          console.log('[PWA] FLUSH_SYNC received');
          flushOfflineQueue();
        }
      });
    } catch (e) {
      console.warn('[PWA] SW registration failed', e);
    }
  });
}

// 2. 離線變更佇列 ─────────────────────────────────────────────────
const OQ_KEY = 'course-tracker-offline-queue';
let _isOnline = navigator.onLine;

function getOfflineQueue() {
  try { return JSON.parse(localStorage.getItem(OQ_KEY) || 'null'); } catch { return null; }
}
function setOfflineQueue(payload) {
  // 只保留最新一份（後蓋前，不需要堆疊）
  try { localStorage.setItem(OQ_KEY, JSON.stringify({ payload, ts: Date.now() })); } catch (e) {}
}
function clearOfflineQueue() {
  localStorage.removeItem(OQ_KEY);
}

// 上線時自動把離線期間的修改同步到 Firebase
async function flushOfflineQueue() {
  const q = getOfflineQueue();
  if (!q || !window._fbUser || !window._fb) return;
  console.log('[PWA] Flushing offline queue, ts:', new Date(q.ts).toLocaleTimeString());
  setSyncStatus('syncing');
  try {
    await window._fb.saveToCloud(window._fbUser.uid, q.payload);
    clearOfflineQueue();
    setSyncStatus('synced');
    console.log('[PWA] Offline queue flushed ✓');
  } catch (e) {
    setSyncStatus('error');
    console.error('[PWA] Flush failed', e);
  }
}

// 監聽網路狀態
window.addEventListener('online', () => {
  _isOnline = true;
  console.log('[PWA] Back online');
  updateNetworkBadge(true);
  flushOfflineQueue();
  // 嘗試 Background Sync（部分瀏覽器支援）
  if (_swReg && 'sync' in _swReg) {
    _swReg.sync.register('sync-state').catch(() => {});
  }
});
window.addEventListener('offline', () => {
  _isOnline = false;
  console.log('[PWA] Went offline');
  updateNetworkBadge(false);
  setSyncStatus('offline');
});

function updateNetworkBadge(online) {
  const lbl = document.getElementById('sync-label');
  if (!lbl) return;
  if (!online) lbl.textContent = '離線中';
}

// 3. 安裝橫幅邏輯 ─────────────────────────────────────────────────
let _deferredPrompt = null;
const INSTALL_DISMISSED_KEY = 'pwa-install-dismissed';

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  // 如果使用者之前沒有拒絕過，顯示橫幅
  if (!localStorage.getItem(INSTALL_DISMISSED_KEY)) {
    showInstallBanner('android');
  }
});

window.addEventListener('appinstalled', () => {
  console.log('[PWA] App installed');
  hideInstallBanner();
  _deferredPrompt = null;
});

function showInstallBanner(type) {
  const banner = document.getElementById('install-banner');
  const iosTip = document.getElementById('ios-install-tip');
  const installBtn = document.getElementById('install-btn');
  if (!banner) return;
  if (type === 'ios') {
    if (installBtn) installBtn.style.display = 'none';
    if (iosTip) iosTip.classList.add('show');
  }
  banner.classList.add('show');
}
function hideInstallBanner() {
  const banner = document.getElementById('install-banner');
  if (banner) banner.classList.remove('show');
}
function dismissInstall() {
  localStorage.setItem(INSTALL_DISMISSED_KEY, '1');
  hideInstallBanner();
}
function triggerInstall() {
  if (_deferredPrompt) {
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then(r => {
      console.log('[PWA] Install choice:', r.outcome);
      if (r.outcome === 'accepted') hideInstallBanner();
      _deferredPrompt = null;
    });
  }
}

// iOS Safari 沒有 beforeinstallprompt，偵測後顯示引導提示
function checkIOSInstall() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandaloneMode = window.navigator.standalone === true;
  const dismissed = localStorage.getItem(INSTALL_DISMISSED_KEY);
  if (isIOS && !isInStandaloneMode && !dismissed) {
    // 延遲 3 秒再顯示，避免剛開啟就彈出
    setTimeout(() => showInstallBanner('ios'), 3000);
  }
}



// ── State & Palette ───────────────────────────────────────────────
const PALETTE=['#c96442','#7a8c6e','#6b8fa8','#9e7b8a','#c4924a','#5a7a8a','#8a7a9e','#7a6a5a'];
let colorCursor=0;
const S={
  courses:[],calendar:{},
  year:new Date().getFullYear(),month:new Date().getMonth(),
  selectedDate:null,view:'month',weekStart:null,
  dragCourseId:null,tapCourseId:null,cid:1,eid:1,
  notes:{},          // {courseId: text}
  courseListExpanded:false,
};
const today=new Date();
const todayStr=ds(today.getFullYear(),today.getMonth(),today.getDate());
S.selectedDate=todayStr;S.weekStart=weekStartOf(todayStr);

// ── Helpers ───────────────────────────────────────────────────────
function ds(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function weekStartOf(s){const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()-dt.getDay());return ds(dt.getFullYear(),dt.getMonth(),dt.getDate());}
function addDays(s,n){const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+n);return ds(dt.getFullYear(),dt.getMonth(),dt.getDate());}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function allEntries(cid){return Object.values(S.calendar).flat().filter(e=>e.courseId===cid);}
function remaining(c){return Math.max(0,c.total-allEntries(c.id).length);}
function completed(c){return allEntries(c.id).filter(e=>e.done).length;}
function course(id){return S.courses.find(c=>c.id===id);}
function isMobile(){return window.innerWidth<=600;}
const WDAYS=['日','一','二','三','四','五','六'];
const MONTHS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const HOURS=Array.from({length:16},(_,i)=>i+7);
function fmtDate(s){const[y,m,d]=s.split('-').map(Number);return`${m}月${d}日（週${WDAYS[new Date(y,m-1,d).getDay()]}）`;}

// ── Persistence ───────────────────────────────────────────────────
const LS='course-tracker-v1';
let _syncPaused=false; // prevent echo loop when applying remote data

function statePayload(){
  return{courses:S.courses,calendar:S.calendar,cid:S.cid,eid:S.eid,colorCursor,notes:S.notes};
}
function applyPayload(d){
  if(d.courses)S.courses=d.courses;
  if(d.calendar)S.calendar=d.calendar;
  if(d.cid)S.cid=d.cid;
  if(d.eid)S.eid=d.eid;
  if(d.colorCursor!=null)colorCursor=d.colorCursor;
  if(d.notes)S.notes=d.notes;
}

function saveState(){
  // 永遠先存本機
  try { localStorage.setItem(LS, JSON.stringify(statePayload())); } catch(e) {}

  if (!window._fbUser || !window._fb || _syncPaused) {
    // 未登入或被暫停：若已登入但離線，存到離線佇列
    if (window._fbUser && !_isOnline) {
      setOfflineQueue(statePayload());
      setSyncStatus('offline');
    }
    return;
  }

  if (!_isOnline) {
    // 登入了但離線：存佇列，等上線再 flush
    setOfflineQueue(statePayload());
    setSyncStatus('offline');
    return;
  }

  // 在線且已登入：直接同步
  setSyncStatus('syncing');
  window._fb.saveToCloud(window._fbUser.uid, statePayload())
    .then(() => {
      clearOfflineQueue(); // 清掉舊的離線佇列
      setSyncStatus('synced');
    })
    .catch(() => {
      // 同步失敗（可能是網路剛斷）：存佇列
      setOfflineQueue(statePayload());
      setSyncStatus('error');
    });
}
function loadState(){
  try{
    const raw=localStorage.getItem(LS);if(!raw)return;
    applyPayload(JSON.parse(raw));
  }catch(e){}
}

// ── Auth callbacks (called from Firebase module) ──────────────────
window.onFirebaseLogin=function(user){
  // Show logged-in UI
  document.getElementById('auth-logged-out').style.display='none';
  const li=document.getElementById('auth-logged-in');li.style.display='flex';
  document.getElementById('user-name').textContent=user.displayName||user.email;
  const av=document.getElementById('user-avatar');
  if(user.photoURL)av.src=user.photoURL;else av.style.display='none';
  setSyncStatus('syncing');
  // Start real-time listener
  window._fb.listenCloud(user.uid,remoteData=>{
    _syncPaused=true;
    applyPayload(remoteData);
    // Also update local cache
    try{localStorage.setItem(LS,JSON.stringify(statePayload()));}catch(e){}
    render();
    _syncPaused=false;
    setSyncStatus('synced');
  });
};
window.onFirebaseLogout=function(){
  document.getElementById('auth-logged-out').style.display='';
  document.getElementById('auth-logged-in').style.display='none';
  setSyncStatus('offline');
};

function setSyncStatus(s){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  if(!dot)return;
  dot.className='sync-dot '+s;
  lbl.textContent={synced:'已同步 ✓',syncing:'同步中…',offline:'本機',error:'同步失敗'}[s]||'';
}

// ── Export / Import ───────────────────────────────────────────────
function exportData(){
  return JSON.stringify({courses:S.courses,calendar:S.calendar,cid:S.cid,eid:S.eid,colorCursor,exportedAt:new Date().toISOString()},null,2);
}
function showExport(){
  openModal('匯出資料','複製以下 JSON，保存到備忘錄或傳給其他裝置後使用「匯入」貼上。',
    [{label:'複製',action:()=>{navigator.clipboard.writeText(exportData()).then(()=>{alert('已複製到剪貼簿！');closeModal();}).catch(()=>{document.getElementById('modal-ta').select();document.execCommand('copy');closeModal();});},primary:true},
     {label:'下載',action:()=>{const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(exportData());a.download=`course-tracker-${todayStr}.json`;a.click();closeModal();}},
     {label:'取消',action:closeModal}],
    exportData());
}
function showImport(){
  openModal('匯入資料','貼上之前匯出的 JSON 資料。⚠️ 這將覆蓋目前所有資料。',
    [{label:'確認匯入',action:()=>{
      const txt=document.getElementById('modal-ta').value.trim();
      try{
        const d=JSON.parse(txt);
        if(!d.courses)throw new Error('格式錯誤');
        if(!confirm('確定匯入？目前資料將被覆蓋。'))return;
        S.courses=d.courses||[];S.calendar=d.calendar||{};
        S.cid=d.cid||1;S.eid=d.eid||1;colorCursor=d.colorCursor||0;
        saveState();render();closeModal();alert('匯入成功！');
      }catch(e){alert('格式錯誤，請貼上正確的備份資料');}
    },primary:true},{label:'取消',action:closeModal}],'');
}
function openModal(title,desc,btns,taVal,htmlBody){
  document.getElementById('modal-title').textContent=title;
  const descEl=document.getElementById('modal-desc');
  if(htmlBody){descEl.innerHTML=htmlBody;descEl.style.marginBottom='0';}
  else{descEl.textContent=desc;descEl.style.marginBottom='';}
  const ta=document.getElementById('modal-ta');
  if(taVal!=null){ta.style.display='block';ta.value=taVal;}else{ta.style.display='none';}
  document.getElementById('modal-btns').innerHTML='';
  btns.forEach(b=>{
    const el=document.createElement('button');
    el.className='btn '+(b.primary?'btn-primary':'btn-sand');
    el.textContent=b.label;el.onclick=b.action;
    document.getElementById('modal-btns').appendChild(el);
  });
  document.getElementById('modal').style.display='flex';
}
function closeModal(){
  document.getElementById('modal').style.display='none';
  document.getElementById('modal-inner').className='modal';
}

// ── Course Actions ────────────────────────────────────────────────
function addCourse(){
  const name=document.getElementById('inp-name').value.trim();
  const total=parseInt(document.getElementById('inp-total').value);
  const examDate=document.getElementById('inp-exam').value||'';
  const lsRaw=parseInt(document.getElementById('inp-ls').value);
  const leRaw=parseInt(document.getElementById('inp-le').value);
  if(!name||!total||total<1)return;
  const lessonStart=isNaN(lsRaw)?1:Math.max(1,lsRaw);
  const lessonEnd=isNaN(leRaw)?total:Math.max(lessonStart,leRaw);
  const id=`c${S.cid++}`;
  S.courses.push({id,name,total,color:PALETTE[colorCursor++%PALETTE.length],examDate,lessonStart,lessonEnd});
  S.notes[id]='';  // init empty memo
  document.getElementById('inp-name').value='';
  document.getElementById('inp-total').value='';
  document.getElementById('inp-exam').value='';
  document.getElementById('inp-ls').value='';
  document.getElementById('inp-le').value='';
  saveState();render();
}
function deleteCourse(id){
  if(!confirm('確定刪除此科目及所有排定課堂？'))return;
  for(const d in S.calendar){S.calendar[d]=S.calendar[d].filter(e=>e.courseId!==id);if(!S.calendar[d].length)delete S.calendar[d];}
  S.courses=S.courses.filter(c=>c.id!==id);
  delete S.notes[id];
  saveState();render();
}

// ── Memo ─────────────────────────────────────────────────────────
function updateMemo(cid,val){
  S.notes[cid]=val;
  saveState();
}
function deleteMemo(cid){
  delete S.notes[cid];
  saveState();renderMemo();
}
function renderMemo(){
  console.log('[renderMemo] courses:',S.courses.length,'notes keys:',Object.keys(S.notes).length);
  const area=document.getElementById('memo-area');
  const grid=document.getElementById('memo-grid');
  if(!area||!grid){console.warn('[renderMemo] DOM not ready');return;}
  if(!S.courses.length){area.style.display='none';return;}
  area.style.display='block';
  grid.innerHTML=S.courses.map(c=>{
    const txt=S.notes[c.id]??'';
    const hasNote=txt.trim().length>0;
    const preview=hasNote?txt:'輸入備忘…';
    return`<div class="memo-card${hasNote?' has-note':''}" onclick="openMemoModal('${c.id}')">
      <div class="memo-card-head">
        <span class="dot" style="background:${c.color}"></span>
        <span class="memo-card-name">${c.name}</span>
        <button class="memo-del-btn" onclick="event.stopPropagation();deleteMemo('${c.id}')" title="清除備忘錄">×</button>
      </div>
      <div class="memo-card-preview${hasNote?'':' empty'}">${preview.replace(/</g,'&lt;')}</div>
    </div>`;
  }).join('');
  console.log('[renderMemo] rendered',S.courses.length,'cards');
}

// ── Memo Modal ────────────────────────────────────────────────────
let _memoCid=null;
function openMemoModal(cid){
  const c=course(cid);if(!c)return;
  _memoCid=cid;
  document.getElementById('memo-modal-dot').style.background=c.color;
  document.getElementById('memo-modal-title').textContent=c.name+' 備忘錄';
  document.getElementById('memo-modal-ta').value=S.notes[cid]??'';
  document.getElementById('memo-modal-backdrop').classList.add('open');
  setTimeout(()=>document.getElementById('memo-modal-ta').focus(),80);
}
function closeMemoModal(e){
  if(e&&e.target!==document.getElementById('memo-modal-backdrop'))return;
  document.getElementById('memo-modal-backdrop').classList.remove('open');
  _memoCid=null;
  renderMemo();
}
function updateMemoFromModal(val){
  if(!_memoCid)return;
  S.notes[_memoCid]=val;
  saveState();
}
function updateExamDate(id,val){const c=course(id);if(!c)return;c.examDate=val;saveState();renderCourses();}

// ── Exam Popover ──────────────────────────────────────────────────
let _examPickerCid=null;
function openExamPicker(id, btnEl){
  _examPickerCid=id;
  const c=course(id);if(!c)return;
  const pop=document.getElementById('exam-popover');
  document.getElementById('exam-pop-input').value=c.examDate||'';
  pop.style.display='block';
  // Position near the button
  const rect=btnEl.getBoundingClientRect();
  const pw=230,ph=120;
  let left=rect.left,top=rect.bottom+6;
  if(left+pw>window.innerWidth-8)left=window.innerWidth-pw-8;
  if(top+ph>window.innerHeight-8)top=rect.top-ph-6;
  pop.style.left=left+'px';pop.style.top=top+'px';
  setTimeout(()=>document.addEventListener('click',_examOutside),0);
}
function _examOutside(e){
  if(!document.getElementById('exam-popover').contains(e.target)){closeExamPicker();}
}
function closeExamPicker(){
  document.getElementById('exam-popover').style.display='none';
  document.removeEventListener('click',_examOutside);
  _examPickerCid=null;
}
function confirmExamDate(){
  if(!_examPickerCid)return;
  const val=document.getElementById('exam-pop-input').value;
  updateExamDate(_examPickerCid,val);
  closeExamPicker();
}
function clearExamDate(){
  if(!_examPickerCid)return;
  updateExamDate(_examPickerCid,'');
  closeExamPicker();
}

// ── Event Actions ─────────────────────────────────────────────────
function addEvent(date,courseId,time=''){if(!S.calendar[date])S.calendar[date]=[];S.calendar[date].push({id:`e${S.eid++}`,courseId,time,done:false});}
function removeEvent(date,eid){S.calendar[date]=S.calendar[date].filter(e=>e.id!==eid);if(!S.calendar[date].length)delete S.calendar[date];saveState();render();}
function toggleDone(date,eid){const ev=(S.calendar[date]||[]).find(e=>e.id===eid);if(ev)ev.done=!ev.done;saveState();render();}
function setTime(date,eid,val){const ev=(S.calendar[date]||[]).find(e=>e.id===eid);if(ev)ev.time=val;saveState();renderDayPanel();renderCalendar();}
function setTimeParts(date,eid,h,m){
  const ev=(S.calendar[date]||[]).find(e=>e.id===eid);if(!ev)return;
  const cur=ev.time||'00:00';const[ch,cm]=cur.split(':').map(Number);
  const nh=h!=null?parseInt(h):ch,nm=m!=null?parseInt(m):cm;
  ev.time=`${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`;
  saveState();renderDayPanel();renderCalendar();
}

// ── Repeat Schedule ───────────────────────────────────────────────
function repeatSchedule(){
  const cid=document.getElementById('rep-course').value;if(!cid){alert('請先選擇科目');return;}
  const days=[...document.querySelectorAll('.rep-day-cb:checked')].map(cb=>+cb.value);if(!days.length){alert('請選擇至少一天');return;}
  const c=course(cid);if(!c)return;let rem=remaining(c);if(rem<=0){alert('此科目已無需排課');return;}
  const start=document.getElementById('rep-start').value||todayStr;let cur=start,added=0;
  for(let i=0;i<730&&rem>0;i++){const[y,m,d]=cur.split('-').map(Number);if(days.includes(new Date(y,m-1,d).getDay())){addEvent(cur,cid);rem--;added++;}cur=addDays(cur,1);}
  if(added){saveState();render();alert(`已為《${c.name}》自動排入 ${added} 堂`);}
}

// ── Exam Badge ────────────────────────────────────────────────────
function examBadge(c){
  if(!c.examDate)return'';
  const days=daysBetween(todayStr,c.examDate),rem=remaining(c);
  if(days<0)return`<span class="exam-badge danger">📋 考試已過期</span>`;
  if(days===0)return`<span class="exam-badge danger">📋 今天考試！</span>`;
  const cls=rem===0?'ok':rem>days*2?'danger':rem>days?'warn':'ok';
  return`<span class="exam-badge ${cls}">📋 考試還有 ${days} 天${rem>0?` · 剩 ${rem} 堂`:' ✓'}</span>`;
}

// ── Mobile Tab ────────────────────────────────────────────────────
let currentMobileTab='course';
function mobileTab(tab){
  currentMobileTab=tab;
  document.getElementById('panel-l').classList.toggle('mob-active',tab==='course');
  document.getElementById('panel-cal').classList.toggle('mob-active',tab==='cal');
  const pr=document.getElementById('panel-r');
  pr.classList.toggle('mob-active',tab==='day');
  pr.classList.remove('mob-visible');
  ['bn-course','bn-cal','bn-day'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById('bn-'+tab).classList.add('active');
  if(tab==='day')renderDayPanel();
}

// ── Tap-to-schedule (mobile) ──────────────────────────────────────
function tapTodo(cid){
  if(!isMobile()){return;}
  if(S.tapCourseId===cid){S.tapCourseId=null;}
  else{S.tapCourseId=cid;mobileTab('cal');}
  renderTodo();renderCalendar();
}
function tapCell(date){
  if(!isMobile()||!S.tapCourseId)return false;
  const c=course(S.tapCourseId);
  if(!c||remaining(c)<=0){S.tapCourseId=null;renderTodo();renderCalendar();return false;}
  addEvent(date,c.id,'');S.selectedDate=date;S.tapCourseId=null;
  saveState();render();mobileTab('day');
  return true;
}

// ── Render ────────────────────────────────────────────────────────
function render(){
  console.log('[render] courses:',S.courses.length,'selected:',S.selectedDate,'view:',S.view);
  renderHeader();renderCourses();renderRepeatSelect();renderTodo();renderCalendar();renderDayPanel();renderMemo();
}

function renderHeader(){
  const total=S.courses.reduce((s,c)=>s+c.total,0);
  const done=S.courses.reduce((s,c)=>s+completed(c),0);
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('global-fill').style.width=pct+'%';
  document.getElementById('global-pct').innerHTML=total>0?`全部 <b>${pct}%</b>`:'';
}
const COURSE_PREVIEW=3;
function toggleCourseList(){S.courseListExpanded=!S.courseListExpanded;renderCourses();}

function renderCourses(){
  const el=document.getElementById('course-list');
  if(!S.courses.length){el.innerHTML='<div class="muted">尚未新增課程</div>';return;}
  const show=S.courseListExpanded?S.courses:S.courses.slice(0,COURSE_PREVIEW);
  const hidden=S.courses.length-COURSE_PREVIEW;

  const cards=show.map(c=>{
    const done=completed(c),arr=allEntries(c.id).length,pct=Math.min(100,Math.round(done/c.total*100));
    const ls=c.lessonStart??1, le=c.lessonEnd??c.total;
    const lessonChip=`<span class="lesson-chip">第 ${ls}–${le} 堂</span>`;
    return`<div class="course-card">
      <div class="course-head">
        <span class="dot" style="background:${c.color}"></span>
        <span class="course-name">${c.name}</span>
        <button class="exam-pen-btn" onclick="openExamPicker('${c.id}',this)" title="設定考試日期">✏️</button>
        <button class="del-btn" onclick="deleteCourse('${c.id}')">×</button>
      </div>
      ${lessonChip}${examBadge(c)}
      <div class="course-meta">共 ${c.total} 堂 · 已排 ${arr} · 完成 ${done} · <b>剩餘 ${remaining(c)}</b></div>
      <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%;background:${c.color}"></div></div>
    </div>`;
  }).join('');

  let footer='';
  if(S.courses.length>COURSE_PREVIEW){
    footer=`<div class="course-list-footer">
      <button class="course-expand-btn" onclick="toggleCourseList()">
        ${S.courseListExpanded?'▲ 收起':'▼ 查看全部（共 '+S.courses.length+' 門）'}
      </button>
    </div>`;
  }
  el.innerHTML=cards+footer;
}
function renderRepeatSelect(){
  const sel=document.getElementById('rep-course'),prev=sel.value;
  sel.innerHTML='<option value="">選擇科目…</option>'+S.courses.map(c=>`<option value="${c.id}">${c.name}（剩 ${remaining(c)} 堂）</option>`).join('');
  if(prev)sel.value=prev;
}
function renderTodo(){
  const el=document.getElementById('todo-list');
  const pending=S.courses.filter(c=>remaining(c)>0);
  if(!pending.length){el.innerHTML=`<div class="muted">${S.courses.length?'🎉 所有課堂已排完畢':'新增課程後顯示於此'}</div>`;return;}
  el.innerHTML=pending.map(c=>{
    const isSel=S.tapCourseId===c.id;
    return`<div class="todo-card ${isSel?'tap-selected':''}" draggable="true"
         ondragstart="dragStart(event,'${c.id}')" ondragend="dragEnd(event)"
         onclick="tapTodo('${c.id}')">
      <span class="dot" style="background:${c.color}"></span>
      <div class="todo-info"><div class="todo-name">${c.name}</div><div class="todo-rem">還有 ${remaining(c)} 堂未安排</div></div>
      <span class="drag-icon">⠿</span>
    </div>`;
  }).join('');
}

// ── Month View ────────────────────────────────────────────────────
function renderMonthView(){
  const{year:y,month:m}=S;
  document.getElementById('cal-title').textContent=`${y} 年 ${MONTHS[m]}`;
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  let html=WDAYS.map(l=>`<div class="cal-lbl">${l}</div>`).join('');
  for(let i=0;i<first;i++)html+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const s=ds(y,m,d),evts=S.calendar[s]||[];
    const isTap=!!S.tapCourseId;
    const cls=['cal-cell',s===todayStr?'today':'',s===S.selectedDate?'selected':'',isTap?'tap-target-ready':''].filter(Boolean).join(' ');
    const tags=evts.slice(0,3).map(ev=>{const c=course(ev.courseId);if(!c)return'';return`<div class="cal-tag" style="background:${c.color}1a;opacity:${ev.done?.5:1}"><span class="cal-tag-dot" style="background:${ev.done?'#b0aea5':c.color}"></span><span class="cal-tag-name" style="color:${ev.done?'var(--text-3)':c.color}">${c.name.slice(0,2)}</span></div>`;}).join('');
    const more=evts.length>3?`<div class="cal-overflow">+${evts.length-3}</div>`:'';
    html+=`<div class="${cls}" onclick="handleCellClick('${s}')"
         ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="drop(event,'${s}')">
      <div class="date-num">${d}</div>
      <div class="cal-tags">${tags}${more}</div>
    </div>`;
  }
  document.getElementById('cal-body').innerHTML=`<div class="cal-grid">${html}</div>`;
}

// ── Week View ─────────────────────────────────────────────────────
function renderWeekView(){
  const weekDays=Array.from({length:7},(_,i)=>addDays(S.weekStart,i));
  const[sy,sm,sd]=weekDays[0].split('-').map(Number);
  const[,em,ed]=weekDays[6].split('-').map(Number);
  document.getElementById('cal-title').textContent=`${sy}年${sm}月${sd}日–${em}月${ed}日`;
  const col=`36px repeat(7,1fr)`,isTap=!!S.tapCourseId;
  let headHtml=`<div class="wch-spacer"></div>`;
  weekDays.forEach((s,i)=>{const[,m,d]=s.split('-').map(Number);headHtml+=`<div class="wch-day ${s===todayStr?'today-col':''}">${WDAYS[i]}<span class="wch-date">${d}</span></div>`;});
  let unHtml=`<div class="unsched-lbl">未定時</div>`;
  weekDays.forEach(s=>{
    const evts=(S.calendar[s]||[]).filter(e=>!e.time);
    const cls=['week-slot-unsched',s===S.selectedDate?'selected-slot':'',isTap?'tap-target-ready':''].filter(Boolean).join(' ');
    unHtml+=`<div class="${cls}" onclick="handleCellClick('${s}')" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="drop(event,'${s}','')">${evts.map(ev=>wkEv(ev,s)).join('')}</div>`;
  });
  let rowsHtml='';
  HOURS.forEach(h=>{
    const t=String(h).padStart(2,'0')+':00';
    rowsHtml+=`<div class="wt-label">${t}</div>`;
    weekDays.forEach(s=>{
      const evts=(S.calendar[s]||[]).filter(e=>e.time&&parseInt(e.time)===h);
      const cls=['week-slot',s===todayStr?'today-slot':'',s===S.selectedDate?'selected-slot':'',isTap?'tap-target-ready':''].filter(Boolean).join(' ');
      rowsHtml+=`<div class="${cls}" onclick="handleCellClick('${s}')" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="drop(event,'${s}','${t}')">${evts.map(ev=>wkEv(ev,s)).join('')}</div>`;
    });
  });
  const body=document.getElementById('cal-body');
  body.innerHTML=`<div class="week-wrap"><div class="week-col-head" style="display:grid;grid-template-columns:${col};">${headHtml}</div><div class="week-scroll"><div class="week-unsched-row" style="grid-template-columns:${col};">${unHtml}</div><div class="week-hour-grid" style="display:grid;grid-template-columns:${col};">${rowsHtml}</div></div></div>`;
  setTimeout(()=>{const sc=body.querySelector('.week-scroll');if(sc)sc.scrollTop=48;},30);
}

function wkEv(ev,date){
  const c=course(ev.courseId);if(!c)return'';
  const lbl=(ev.time?ev.time.slice(0,5)+' ':'')+c.name.slice(0,3);
  return`<div class="week-ev" style="background:${c.color}18;color:${c.color};${ev.done?'opacity:.45;text-decoration:line-through':''}" title="${c.name}${ev.time?' @ '+ev.time:''}" onclick="event.stopPropagation();selectDate('${date}');${isMobile()?'mobileTab(\'day\')':''}"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${c.color};flex-shrink:0;"></span>${lbl}</div>`;
}

function handleCellClick(date){
  if(tapCell(date))return;  // mobile tap-to-schedule
  selectDate(date);
  if(isMobile())mobileTab('day');
}

function renderCalendar(){
  document.getElementById('vt-month').className='vt-btn'+(S.view==='month'?' active':'');
  document.getElementById('vt-week').className='vt-btn'+(S.view==='week'?' active':'');
  if(S.view==='month')renderMonthView();else renderWeekView();
}

function renderDayPanel(){
  const label=document.getElementById('day-label');
  const el=document.getElementById('day-events');
  if(!S.selectedDate){label.textContent='選擇日期';el.innerHTML=`<div class="empty-state"><div class="empty-icon">📅</div><p>點擊行事曆格子<br>查看當天課程安排</p></div>`;return;}
  label.textContent=fmtDate(S.selectedDate);
  const allEvts=S.calendar[S.selectedDate]||[];
  if(!allEvts.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">✨</div><p>這天還沒有課程<br>${isMobile()?'點選「行事曆」標籤選課堂':'從左側拖曳課堂到這個日期'}</p></div>`;return;}
  const timed=allEvts.filter(e=>e.time).slice().sort((a,b)=>a.time.localeCompare(b.time));
  const untimed=allEvts.filter(e=>!e.time);
  const groups={};
  untimed.forEach(ev=>{if(!groups[ev.courseId])groups[ev.courseId]=[];groups[ev.courseId].push(ev);});
  let html='';
  timed.forEach(ev=>{
    const c=course(ev.courseId);if(!c)return;
    const[hh,mm]=ev.time?ev.time.split(':').map(Number):[0,0];
    const hourOpts=Array.from({length:24},(_,i)=>`<option value="${i}" ${i===hh?'selected':''}>${String(i).padStart(2,'0')}</option>`).join('');
    const minOpts=[0,5,10,15,20,25,30,35,40,45,50,55].map(m=>`<option value="${m}" ${m===mm?'selected':''}>${String(m).padStart(2,'0')}</option>`).join('');
    html+=`<div class="day-card ${ev.done?'is-done':''}">
      <div class="day-card-head"><span class="dot" style="background:${c.color}"></span><span class="day-name" style="${ev.done?'text-decoration:line-through;opacity:.55':''}">${c.name}</span>
        <div class="day-actions"><button class="act-btn ${ev.done?'done-btn':''}" onclick="toggleDone('${S.selectedDate}','${ev.id}')">${ev.done?'取消':'完成'}</button><button class="act-btn" onclick="removeEvent('${S.selectedDate}','${ev.id}')">移除</button></div>
      </div>
      <div class="time-wrap"><span class="time-lbl">時間</span>
        <div class="time-selects">
          <select class="time-sel" onchange="setTimeParts('${S.selectedDate}','${ev.id}',this.value,null)">${hourOpts}</select>
          <span>:</span>
          <select class="time-sel" onchange="setTimeParts('${S.selectedDate}','${ev.id}',null,this.value)">${minOpts}</select>
          <button class="time-clear" onclick="setTime('${S.selectedDate}','${ev.id}','')">✕</button>
        </div>
      </div>
    </div>`;
  });
  Object.keys(groups).forEach(cid=>{
    const c=course(cid);if(!c)return;
    const items=groups[cid];
    // Calculate absolute lesson number = lessonStart + how many entries already exist before these
    const allDone=allEntries(cid).filter(e=>e.done).length;
    const ls=c.lessonStart??1;
    const itemsHtml=items.map((ev,idx)=>{
      const lessonNo=ls+allDone+idx;
      const minOpts=[0,5,10,15,20,25,30,35,40,45,50,55].map(m=>`<option value="${m}">${String(m).padStart(2,'0')}</option>`).join('');
      const hourOpts=Array.from({length:24},(_,i)=>`<option value="${i}">${String(i).padStart(2,'0')}</option>`).join('');
      return`<div class="day-group-item ${ev.done?'is-done':''}">
        <div style="flex:1;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <span class="dgi-label ${ev.done?'crossed':''}">第 ${lessonNo} 堂</span>
            <div class="dgi-actions">
              <button class="act-btn ${ev.done?'done-btn':''}" onclick="toggleDone('${S.selectedDate}','${ev.id}')">${ev.done?'取消':'完成'}</button>
              <button class="act-btn" onclick="removeEvent('${S.selectedDate}','${ev.id}')">移除</button>
            </div>
          </div>
          <div class="time-wrap" style="margin-top:0;">
            <span class="time-lbl">設定時間</span>
            <div class="time-selects">
              <select class="time-sel" onchange="setTimeParts('${S.selectedDate}','${ev.id}',this.value,null)">${hourOpts}</select>
              <span class="time-colon">:</span>
              <select class="time-sel" onchange="setTimeParts('${S.selectedDate}','${ev.id}',null,this.value)">${minOpts}</select>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
    html+=`<div class="day-group"><div class="day-group-head"><span class="dot" style="background:${c.color}"></span><span class="day-group-name">${c.name}</span><span class="day-group-count">${items.length} 堂（未定時）</span></div>${itemsHtml}</div>`;
  });
  el.innerHTML=html;
}

// ── Drag & Drop ───────────────────────────────────────────────────
const ghost=document.getElementById('drag-ghost');
const ghostDot=document.getElementById('ghost-dot');
const ghostName=document.getElementById('ghost-name');
function dragStart(e,cid){
  S.dragCourseId=cid;e.dataTransfer.effectAllowed='copy';
  const c=course(cid);if(c){ghostDot.style.background=c.color;ghostName.textContent=c.name;}
  setTimeout(()=>{e.currentTarget.classList.add('dragging');ghost.classList.add('active');},0);
}
function dragEnd(e){e.currentTarget.classList.remove('dragging');ghost.classList.remove('active');S.dragCourseId=null;}
document.addEventListener('dragover',e=>{ghost.style.left=e.clientX+'px';ghost.style.top=e.clientY+'px';});
function dragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function drop(e,date,time=''){
  e.preventDefault();e.stopPropagation();e.currentTarget.classList.remove('drag-over');
  const c=course(S.dragCourseId);if(!c||remaining(c)<=0)return;
  addEvent(date,c.id,time);S.selectedDate=date;saveState();render();
}

// ── Navigation ────────────────────────────────────────────────────
function setView(v){S.view=v;if(v==='week')S.weekStart=weekStartOf(S.selectedDate||todayStr);render();}
function selectDate(s){S.selectedDate=s;if(S.view==='week')S.weekStart=weekStartOf(s);render();}
function navPrev(){if(S.view==='month'){if(--S.month<0){S.month=11;S.year--;}}else S.weekStart=addDays(S.weekStart,-7);render();}
function navNext(){if(S.view==='month'){if(++S.month>11){S.month=0;S.year++;}}else S.weekStart=addDays(S.weekStart,7);render();}
function jumpToday(){S.year=today.getFullYear();S.month=today.getMonth();S.selectedDate=todayStr;S.weekStart=weekStartOf(todayStr);render();}

// ── 全域錯誤監控 ─────────────────────────────────────────────────
window.onerror=function(msg,src,line,col,err){

};

};

// ── 登入入口（帶 _fb 就緒防呆）────────────────────────────────────

// ── Init ──────────────────────────────────────────────────────────
function init(){
  console.log('[init] start');

  // Weekday checkboxes
  const ww=document.getElementById('wday-wrap');
  WDAYS.forEach((w,i)=>{
    const wrap=document.createElement('div');
    wrap.innerHTML=`<input type="checkbox" class="rep-day-cb wday-cb" id="wd${i}" value="${i}"><label class="wday-label" for="wd${i}">${w}</label>`;
    ww.appendChild(wrap);
  });

  document.getElementById('rep-start').value=todayStr;

  // Keyboard shortcuts
  document.getElementById('inp-name').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('inp-total').focus();});
  document.getElementById('inp-total').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('inp-ls').focus();});
  document.getElementById('inp-total').addEventListener('change',()=>{
    const t=parseInt(document.getElementById('inp-total').value);
    if(!isNaN(t)&&t>0){
      if(!document.getElementById('inp-ls').value)document.getElementById('inp-ls').value=1;
      if(!document.getElementById('inp-le').value)document.getElementById('inp-le').value=t;
    }
  });
  document.getElementById('inp-ls').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('inp-le').focus();});
  document.getElementById('inp-le').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('inp-exam').focus();});
  document.getElementById('inp-exam').addEventListener('keydown',e=>{if(e.key==='Enter')addCourse();});

  // Mobile layout
  if(isMobile()){
    document.getElementById('panel-l').classList.add('mob-active');
  }

  loadState();

  // 遷移舊課程資料（補 notes key）
  S.courses.forEach(c => {
    if (!(c.id in S.notes)) S.notes[c.id] = '';
  });

  render();
  checkIOSInstall(); // 顯示 iOS 安裝引導（如適用）
  console.log('[init] done — courses:', S.courses.length, 'notes keys:', Object.keys(S.notes).length);
}

// 等 DOM 確實就緒才執行
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
}else{
  init();
}
</script>
</body>
</html>
